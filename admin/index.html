<!DOCTYPE html>
<html>
<head><title>Admin Login</title><style>body{background:#0a0a0f;color:#f0f0f5;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh}form{background:#12121a;padding:2rem;border-radius:12px;border:1px solid #222}input{background:#1a1a2e;border:1px solid #333;color:#fff;padding:0.8rem 1.2rem;border-radius:6px;font-size:1rem;margin-bottom:1rem;width:100%}button{background:linear-gradient(135deg,#7b68ee,#00d4ff);border:none;padding:0.8rem 2rem;color:white;border-radius:6px;font-size:1rem;cursor:pointer;width:100%}</style></head>
<body>
  <form onsubmit="login(event)">
    <h2 style="margin-bottom:1.5rem;text-align:center">Admin Login</h2>
    <input type="password" id="pw" placeholder="Enter password"/>
    <button type="submit">Enter</button>
    <p id="err" style="color:#ff4444;margin-top:1rem;display:none">Wrong password</p>
  </form>
  <script>
  async function login(e){
    e.preventDefault();
    const pw=document.getElementById('pw').value;
    const res=await fetch('/.netlify/functions/auth',{method:'POST',body:JSON.stringify({password:pw})});
    const d=await res.json();
    if(d.ok){sessionStorage.setItem('admin','1');location.href='/admin/creator.html';}
    else{document.getElementById('err').style.display='block';}
  }
  </script>
</body>
</html>
