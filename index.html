<script>
(function(){
  function syncMarquee(){
    var track=document.querySelector('.marquee-track');
    if(!track)return;
    var max=Math.max(1,document.documentElement.scrollHeight-window.innerHeight);
    var progress=Math.max(0,Math.min(1,window.scrollY/max));
    track.style.setProperty('--marquee-offset',(-50*progress).toFixed(3)+'%');
  }
  window.addEventListener('scroll',syncMarquee,{passive:true});
  window.addEventListener('resize',syncMarquee);
  document.addEventListener('DOMContentLoaded',syncMarquee);
})();
</script>
