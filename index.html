<style>
.nav-logo{gap:8px;align-items:center;display:flex;position:relative;z-index:2;flex:0 0 auto;min-width:220px}
.nav-logo-img{height:132px;width:auto;max-width:none;display:block;object-fit:contain;transform:translateY(2px)}
nav{position:relative}
.nav-links{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;gap:28px;width:max-content;z-index:1}
.nav-spacer{flex:1 1 auto;min-width:0}
.nav-basket-btn{position:relative;z-index:2;margin-left:auto}
@media(max-width:1100px){
  .nav-logo{min-width:180px}
  .nav-logo-img{height:118px}
  .nav-links{gap:20px}
}
@media(max-width:932px){
  .nav-logo{min-width:0}
  .nav-logo-img{height:104px;transform:none}
  .nav-links{position:static;left:auto;top:auto;transform:none;width:auto;gap:16px}
}

/* TYPE TAGS */
.type-tag{font-family:var(--fm);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.type-tag.series{background:rgba(232,130,10,.12);color:var(--accent);border:1px solid rgba(232,130,10,.35)}
.type-tag.collection{background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.35)}
.type-tag::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%}
.type-tag.series::before{background:var(--accent)}
.type-tag.collection::before{background:var(--gold)}

/* ANIMATIONS */
@keyframes orbitPulse{0%,100%{box-shadow:0 0 24px rgba(232,130,10,.7),0 0 48px rgba(232,130,10,.3)}50%{box-shadow:0 0 40px rgba(232,130,10,.9),0 0 80px rgba(232,130,10,.5)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(201,169,110,.4)}50%{text-shadow:0 0 40px rgba(201,169,110,.8),0 0 80px rgba(201,169,110,.3)}}
@keyframes borderGlow{0%,100%{border-color:rgba(232,130,10,.15)}50%{border-color:rgba(232,130,10,.4)}}
@keyframes nebulaDrift{0%,100%{transform:scale(1) translate(0,0)}33%{transform:scale(1.03) translate(-1%,.5%)}66%{transform:scale(1.02) translate(.5%,-1%)}}
@keyframes cardReveal{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}

.nav-logo-mark{animation:orbitPulse 3s ease-in-out infinite}
.hero h1 em{animation:glowPulse 4s ease-in-out infinite}
.hero-bg img{animation:nebulaDrift 18s ease-in-out infinite}
nav{animation:borderGlow 6s ease-in-out infinite}
.card{transition:transform .3s cubic-bezier(.22,1,.36,1),border-color .3s,box-shadow .3s}
.card:hover{transform:translateY(-6px) scale(1.006);box-shadow:0 28px 72px rgba(0,0,0,.5),0 0 0 1px rgba(232,130,10,.15)}
.card-media img{transition:transform .7s cubic-bezier(.22,1,.36,1)}
.card:hover .card-media img{transform:scale(1.08)}
.btn{transition:all .22s cubic-bezier(.22,1,.36,1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2),#f0d899,var(--gold));background-size:300% auto}
.btn-gold:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,169,110,.5)}

/* PROMO CODE */
.promo-wrap{display:flex;gap:8px;margin-bottom:12px}
.promo-input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--fm);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;outline:none;transition:border-color .2s}
.promo-input:focus{border-color:var(--accent)}
.promo-input::placeholder{text-transform:none;letter-spacing:0;color:var(--muted)}
.promo-apply-btn{padding:10px 18px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--rs);font-family:var(--fu);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:.18s}
.promo-apply-btn:hover{border-color:var(--accent);color:var(--accent)}
.promo-apply-btn:disabled{opacity:.5;cursor:not-allowed}
.promo-badge{display:flex;align-items:center;justify-content:space-between;background:rgba(46,204,138,.08);border:1px solid rgba(46,204,138,.25);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;font-size:.84rem}
.promo-badge-left{display:flex;align-items:center;gap:8px;color:var(--success)}
.promo-badge-remove{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:6px;transition:color .15s}
.promo-badge-remove:hover{color:var(--danger)}
.promo-error{color:var(--danger);font-size:.78rem;margin:-8px 0 8px;display:none}
.promo-checking{opacity:.6;font-size:.78rem;color:var(--muted);margin:-4px 0 8px;display:none}

/* SPIN LOADER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

/* STRIPE */
#stripe-payment-element{padding:16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);margin-bottom:12px;min-height:80px}
#stripe-error{color:var(--danger);font-size:.82rem;margin-bottom:10px;min-height:1.2em}
.stripe-secure-note{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:.63rem;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}

/* TEAM */
.team-login-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:48px 24px;text-align:center}
.team-login-icon{width:72px;height:72px;background:var(--surface2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto}
.team-login-form{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:28px;width:100%;max-width:380px}
.team-login-form h3{font-family:var(--fd);font-size:1.6rem;font-weight:300;margin-bottom:6px}
.team-login-form p{color:var(--muted);font-size:.88rem;margin-bottom:20px}

/* WALL ART TABS */
.wa-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border2);border-radius:999px;padding:4px;width:fit-content;margin-bottom:36px}
.wa-tab{padding:10px 28px;border-radius:999px;font-family:var(--fm);font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.2s}
.wa-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(232,130,10,.35)}

/* ARTIFACTS */
.artifacts-hero{text-align:center;padding:72px 24px 48px}
.artifact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:0 24px 80px;max-width:1280px;margin:0 auto}
.artifact-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;transition:transform .3s,box-shadow .3s}
.artifact-card:hover{transform:translateY(-4px);box-shadow:0 24px 64px rgba(0,0,0,.5)}
.artifact-card-img{width:100%;height:200px;object-fit:cover;display:block;background:linear-gradient(135deg,var(--surface2),var(--surface))}
.artifact-card-body{padding:20px}
.artifact-card-body h3{font-family:var(--fd);font-size:1.25rem;font-weight:400;margin-bottom:6px}
.artifact-card-body p{color:var(--muted);font-size:.87rem;line-height:1.65;margin-bottom:14px}
.artifact-tag{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--border2);color:var(--muted);display:inline-block;margin-bottom:10px}
.artifact-price{font-family:var(--fd);font-size:1.6rem;color:var(--gold);margin-bottom:14px}

/* PAYMENT GATE */
.payment-gate-notice{background:rgba(224,80,80,.08);border:1px solid rgba(224,80,80,.25);border-radius:var(--rs);padding:12px 16px;font-size:.84rem;color:var(--danger);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.payment-gate-notice::before{content:'🔒';font-size:.9rem}

/* BACK TO TOP */
#back-to-top{position:fixed;bottom:90px;right:20px;width:40px;height:40px;background:var(--surface2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s,border-color .2s;z-index:90;font-size:1rem}
#back-to-top.visible{opacity:1;transform:translateY(0)}
#back-to-top:hover{border-color:var(--accent);color:var(--accent)}

/* STICKY ADD TO BASKET BAR (product page) */
.sticky-add-bar{position:sticky;bottom:0;background:rgba(7,11,18,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:50;transform:translateY(100%);transition:transform .3s}
.sticky-add-bar.visible{transform:translateY(0)}
.sticky-add-bar-name{font-family:var(--fd);font-size:1.1rem;font-weight:300}
.sticky-add-bar-price{font-family:var(--fd);font-size:1.3rem;color:var(--gold)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(232,130,10,.3);border-radius:4px}

@media(max-width:932px){
  .sticky-add-bar{padding:10px 16px}
  .sticky-add-bar-name{font-size:.9rem}
  #back-to-top{bottom:80px}
}
</style>
</head>
